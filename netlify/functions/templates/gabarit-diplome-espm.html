<title>Diplôme — École Secondaire Plurielle Maritime</title>

<!--
  ============================================================================
  GABARIT DE DIPLÔME — École Secondaire Plurielle Maritime
  À injecter dans ESPM+ comme modèle de génération.

  CHAMPS À FUSIONNER (remplacés automatiquement par ESPM+) :
    {{PRENOM}}            → prénom de l'élève
    {{NOM}}               → nom de l'élève
    {{ANNEE_SCOLAIRE}}    → ex. 2025 – 2026
    {{DATE_PROCLAMATION}} → ex. 27 juin 2026
  (Adaptez les noms de balises ci-dessous à ceux utilisés par ESPM+ si besoin.)

  • Format : A4 paysage, prêt pour génération PDF.
  • Police : chargée depuis Google Fonts. Si ESPM+ génère les PDF SANS accès
    Internet, prévenez-moi et j'intègre les polices dans le fichier.
  • Ordre du nom : "{{PRENOM}} {{NOM}}". Pour inverser, échangez les deux balises
    dans le bloc .d-name ci-dessous.
  ============================================================================
-->

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,400;1,500&family=Pinyon+Script&display=swap" rel="stylesheet">

<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: #e7e1d7;
    display: flex; align-items: center; justify-content: center; min-height: 100vh;
    -webkit-print-color-adjust: exact; print-color-adjust: exact;
  }
  .d-page {
    position: relative; width: 297mm; height: 210mm; overflow: hidden;
    background: radial-gradient(125% 120% at 50% 32%, #fdfcf9 0%, #faf7f0 58%, #f3eee4 100%);
    box-shadow: 0 28px 70px rgba(35,17,30,0.20);
    font-family: 'Cormorant Garamond', Georgia, 'Times New Roman', serif;
    color: #23111e;
  }
  .d-frame-ink  { position: absolute; inset: 26px; border: 1.5px solid #23111e; pointer-events: none; }
  .d-frame-gold { position: absolute; inset: 33px; border: 1px solid rgba(168,134,74,0.55); pointer-events: none; }
  .d-corner { position: absolute; width: 9px; height: 9px; background: #a8864a; }
  .d-corner.tl { left: 26px;  top: 26px;    transform: translate(-50%,-50%) rotate(45deg); }
  .d-corner.tr { right: 26px; top: 26px;    transform: translate(50%,-50%) rotate(45deg); }
  .d-corner.bl { left: 26px;  bottom: 26px; transform: translate(-50%,50%) rotate(45deg); }
  .d-corner.br { right: 26px; bottom: 26px; transform: translate(50%,50%) rotate(45deg); }

  .d-content {
    position: absolute; inset: 33px;
    display: flex; flex-direction: column; align-items: center;
    padding: 44px 92px 38px;
  }
  .d-logo { height: 47px; width: auto; object-fit: contain; }

  .d-eyebrow { display: flex; align-items: center; gap: 16px; margin-top: 17px; }
  .d-eyebrow .rule { display: block; width: 46px; height: 1px; background: rgba(168,134,74,0.75); }
  .d-eyebrow .label { font-size: 13px; letter-spacing: 0.32em; text-transform: uppercase; color: #9c7787; }

  .d-title { margin: 24px 0 0; font-weight: 600; font-size: 112px; line-height: 0.92; letter-spacing: 0.05em; color: #23111e; }

  .d-ornament { display: flex; align-items: center; gap: 12px; margin-top: 12px; }
  .d-ornament .g-left  { display: block; width: 74px; height: 1px; background: linear-gradient(90deg, rgba(168,134,74,0) 0%, #a8864a 100%); }
  .d-ornament .g-right { display: block; width: 74px; height: 1px; background: linear-gradient(90deg, #a8864a 0%, rgba(168,134,74,0) 100%); }
  .d-ornament .dia { display: block; width: 7px; height: 7px; background: #a8864a; transform: rotate(45deg); }

  .d-delivre { margin: 14px 0 0; font-style: italic; font-weight: 400; font-size: 30px; color: #b78e9e; letter-spacing: 0.02em; }

  .d-name { margin-top: 8px; font-family: 'Pinyon Script', 'Cormorant Garamond', cursive; font-weight: 400; font-size: 82px; line-height: 1.05; color: #23111e; text-align: center; max-width: 820px; }

  .d-name-rule { display: flex; align-items: center; gap: 14px; margin-top: 4px; }
  .d-name-rule .dia { display: block; width: 9px; height: 9px; border: 1px solid #a8864a; transform: rotate(45deg); }
  .d-name-rule .line { display: block; width: 380px; height: 1px; background: rgba(35,17,30,0.28); }

  .d-body { margin: 22px 0 0; max-width: 620px; text-align: center; font-size: 25px; line-height: 1.5; color: #2f1d27; text-wrap: balance; }

  .d-spacer { flex: 1 1 auto; min-height: 14px; }

  .d-footer { width: 100%; display: flex; align-items: flex-end; justify-content: space-between; }
  .d-sigcol { display: flex; flex-direction: column; align-items: center; width: 250px; }
  .d-sigcol .space { display: block; height: 40px; }
  .d-sigcol .sigline { display: block; width: 198px; height: 1px; background: rgba(35,17,30,0.5); }
  .d-sigcol .signame { margin-top: 7px; font-size: 23px; color: #23111e; }
  .d-sigcol .sigrole { margin-top: 3px; font-size: 12px; letter-spacing: 0.26em; text-transform: uppercase; color: #9c7787; }

  @media print {
    body { background: #ffffff; min-height: 0; }
    .d-page { box-shadow: none; }
    @page { size: A4 landscape; margin: 0; }
  }
</style>
</head>
